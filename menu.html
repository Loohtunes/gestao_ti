<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão T.I</title>
  <link rel="icon" href="img/premovale (1).png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS Base -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/nav.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/modals.css">
  <link rel="stylesheet" href="assets/css/comments.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <link rel="stylesheet" href="assets/css/comunicados.css">

  <!-- Modal AFK -->
  <style>
    #afk-warning-overlay {
      position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      animation: slideUpDetail 0.25s ease;
    }
    .afk-warning-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 2rem 2.5rem;
      max-width: 380px; width: 90%;
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .afk-warning-icon  { font-size: 2.5rem; }
    .afk-warning-title { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .afk-warning-text  { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .afk-warning-countdown {
      font-size: 2rem; font-weight: 800;
      font-family: var(--font-mono);
      color: var(--accent);
    }
    .afk-warning-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 0.7rem 1.8rem;
      font-size: 0.85rem; font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer; width: 100%;
    }
    .afk-warning-btn:hover { opacity: 0.9; }

    @keyframes slideUpDetail {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ══ NAVBAR ══ -->
  <nav>
    <div class="nav-logo" onclick="window.location.href='menu.html'"
      style="cursor:pointer;" title="Menu Principal">
      <img src="img/premovale (1).png" width="30px" height="30px">
      <span class="nav-title">
        <span class="nav-title-ti">T.I</span>
        <span class="nav-title-sep">/</span>
        <span class="nav-title-main">Gestão</span>
      </span>
    </div>

    <!-- Timer de sessão -->
    <div id="session-timer" style="display:none;flex-direction:column;align-items:center;gap:3px;min-width:120px;">
      <div style="display:flex;align-items:center;gap:0.4rem;">
        <span style="font-size:0.6rem;font-family:'Space Mono',monospace;color:var(--muted);
          text-transform:uppercase;letter-spacing:0.08em;">Sessão</span>
        <span id="session-countdown" style="font-size:0.75rem;font-family:'Space Mono',monospace;
          font-weight:700;color:var(--muted);letter-spacing:0.05em;transition:color 0.3s;">--:--</span>
      </div>
      <div id="session-bar-track" style="width:110px;height:3px;background:var(--surface3);
        border-radius:2px;overflow:hidden;">
        <div id="session-bar-fill" style="height:100%;width:100%;border-radius:2px;
          background:var(--accent);transition:width 1s linear,background 0.3s;"></div>
      </div>
    </div>

    <div class="nav-right">
      <!-- Novidades -->
      <div style="position:relative;display:inline-block;">
        <button class="sync-fab-small" id="changelog-btn" onclick="toggleChangelog()"
          title="Notas de Atualização" style="gap:0.4rem;">
          📋 Novidades
        </button>
        <span id="changelog-badge" style="display:none;position:absolute;top:-6px;right:-6px;
          width:16px;height:16px;background:var(--accent);color:#fff;border-radius:50%;
          font-size:0.6rem;font-family:'Space Mono',monospace;font-weight:700;
          align-items:center;justify-content:center;border:2px solid var(--bg);">N</span>
      </div>

      <!-- Switch Tema -->
      <div id="theme-switch-track" data-dark="0" onclick="toggleDarkMode()"
        title="Alternar tema"
        style="display:flex;align-items:center;gap:0.3rem;cursor:pointer;
          background:var(--surface2);border:1px solid var(--border2);border-radius:20px;
          padding:0.25rem 0.55rem;transition:all 0.2s;flex-shrink:0;user-select:none;">
        <span style="font-size:0.8rem;">☀️</span>
        <div style="position:relative;width:28px;height:16px;background:var(--surface3);
          border-radius:8px;border:1px solid var(--border2);transition:background 0.2s;">
          <div id="theme-switch-thumb"
            style="position:absolute;top:1px;left:1px;width:12px;height:12px;
              background:var(--muted);border-radius:50%;transition:transform 0.2s,background 0.2s;">
          </div>
        </div>
        <span style="font-size:0.8rem;">🌙</span>
      </div>

      <!-- Firebase — só superadmin -->
      <button class="sync-fab-small" id="sync-fab-nav" title="Firebase: verificando conexão..."
        style="display:none;">
        <span id="sync-icon-nav">🟡</span>Firebase
      </button>
    </div>
  </nav>

  <!-- ══ LAYOUT PRINCIPAL ══ -->
  <div class="menu-wrapper">

    <!-- SIDEBAR -->
    <aside class="menu-sidebar">

      <span class="sidebar-section-label">Módulos</span>

      <!-- Chamados — funcional -->
      <button class="sidebar-item active" onclick="goToChamados()">
        <span class="sidebar-item-icon">🎫</span>
        Chamados
      </button>

      <!-- Materiais — em breve -->
      <button class="sidebar-item" disabled>
        <span class="sidebar-item-icon">📦</span>
        Materiais
        <span class="sidebar-soon">Em breve</span>
      </button>

      <!-- Inventário — em breve -->
      <button class="sidebar-item" disabled>
        <span class="sidebar-item-icon">🗃️</span>
        Inventário
        <span class="sidebar-soon">Em breve</span>
      </button>

      <!-- Configurações — em breve -->
      <button class="sidebar-item" disabled>
        <span class="sidebar-item-icon">⚙️</span>
        Configurações
        <span class="sidebar-soon">Em breve</span>
      </button>

      <div class="sidebar-divider"></div>

      <!-- Rodapé com usuário e sair -->
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="sidebar-avatar">?</div>
          <div style="display:flex;flex-direction:column;gap:2px;overflow:hidden;">
            <span class="sidebar-user-name" id="sidebar-user-name">—</span>
            <span class="sidebar-user-role" id="sidebar-user-role">—</span>
          </div>
        </div>
        <button class="sidebar-logout" onclick="menuLogout()">
          <span>🚪</span> Sair do sistema
        </button>
      </div>

    </aside>

    <!-- ÁREA CENTRAL -->
    <main class="menu-content">
      <div class="menu-greeting">
        <div class="menu-greeting-title" id="menu-greeting-title">Olá! 👋</div>
        <div class="menu-greeting-sub" id="menu-greeting-sub">// Carregando...</div>
      </div>

      <!-- Comunicados -->
      <div class="comunicados-wrapper">
        <div class="comunicados-header">
          <span class="comunicados-header-title">📢 Comunicados</span>
          <div class="comunicados-header-actions">
            <button class="comunicados-history-btn" id="comunicados-history-btn"
              onclick="toggleComunicadosHistory()">📁 Ver Histórico</button>
            <button class="comunicados-new-btn" onclick="openNovaComunicado()">
              + Nova publicação
            </button>
          </div>
        </div>
        <div class="comunicados-feed" id="comunicados-feed">
          <div class="comunicados-empty">
            <span class="comunicados-empty-icon">📭</span>
            <span>Carregando...</span>
          </div>
        </div>
        <!-- Histórico arquivado -->
        <div class="comunicados-history-section" id="comunicados-history-section">
          <div class="comunicados-history-label">📁 Histórico arquivado</div>
          <div id="comunicados-history"></div>
        </div>
      </div>

    </main>

  </div>

  <!-- ══ PAINEL NOVIDADES ══ -->
  <div id="changelog-panel" style="display:none;position:fixed;top:56px;right:1rem;
    width:320px;max-height:70vh;background:var(--surface);border:1px solid var(--border2);
    border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,0.15);z-index:300;
    flex-direction:column;overflow:hidden;
    transform:scaleY(0.8) scaleX(0.95);transform-origin:top right;
    opacity:0;pointer-events:none;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),opacity 0.2s;">
    <div style="padding:1rem 1.2rem;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;background:var(--surface2);">
      <span style="font-size:0.88rem;font-weight:700;">📋 Novidades</span>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <button id="changelog-manage-btn" onclick="openChangelogManager()" title="Publicar Novidades"
          style="display:none;font-size:0.72rem;font-family:var(--font-mono);font-weight:700;
            padding:0.3rem 0.65rem;border-radius:6px;cursor:pointer;
            background:var(--accent);color:#fff;border:none;transition:all 0.15s;">
          ✏️ Publicar
        </button>
        <button onclick="toggleChangelog()"
          style="width:28px;height:28px;border:1px solid var(--border2);border-radius:6px;
            background:var(--surface3);color:var(--muted);cursor:pointer;font-size:0.8rem;
            display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
    </div>
    <div id="changelog-list" style="overflow-y:auto;padding:1rem 1.2rem;flex:1;
      font-family:'Space Mono',monospace;">
      <div style="text-align:center;color:var(--muted);font-size:0.82rem;padding:2rem;">
        Carregando...
      </div>
    </div>
  </div>

  <!-- ══ MODAL: PUBLICAR NOVIDADES (super admin) ══ -->
  <div class="modal-overlay" id="changelog-modal" onclick="if(event.target===this)closeChangelogManager()">
    <div class="modal-content" style="max-width:480px;">
      <div class="modal-header">
        <div class="modal-title">📋 Publicar Novidades</div>
        <button class="modal-close" onclick="closeChangelogManager()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Versão</label>
          <input type="text" class="form-input" id="cl-version-input" placeholder="Ex: v1.4.0">
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" class="form-input" id="cl-date-input">
        </div>
        <div class="form-group">
          <label class="form-label">Notas (uma por linha)</label>
          <textarea class="form-textarea" id="cl-notes-input"
            placeholder="Nova funcionalidade X&#10;Correção do bug Y&#10;Melhoria no Z"
            style="min-height:140px;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeChangelogManager()">Cancelar</button>
        <button class="btn-save" onclick="saveChangelog()">📋 Publicar</button>
      </div>
    </div>
  </div>

  <!-- ══ MODAL: NOVO COMUNICADO ══ -->
  <div class="modal-overlay" id="comunicado-modal" onclick="if(event.target===this)closeComunicadoModal()">
    <div class="modal-content" style="max-width:500px;">
      <div class="modal-header">
        <div class="modal-title">📢 Nova Publicação</div>
        <button class="modal-close" onclick="closeComunicadoModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Título</label>
          <input type="text" class="form-input" id="com-titulo-input"
            placeholder="Título do comunicado">
        </div>
        <div class="form-group">
          <label class="form-label">Mensagem</label>
          <textarea class="form-textarea" id="com-mensagem-input"
            placeholder="Escreva o comunicado..."
            style="min-height:120px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Prioridade</label>
          <div class="comunicado-prio-select">
            <button class="comunicado-prio-option selected normal" data-prio="normal"
              onclick="selectPrio('normal')">🔵 Normal</button>
            <button class="comunicado-prio-option" data-prio="importante"
              onclick="selectPrio('importante')">🟡 Importante</button>
            <button class="comunicado-prio-option" data-prio="urgente"
              onclick="selectPrio('urgente')">🔴 Urgente</button>
          </div>
        </div>
        <div class="form-group" style="flex-direction:row;align-items:center;gap:0.75rem;">
          <input type="checkbox" id="com-fixado-input"
            style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
          <label for="com-fixado-input" style="cursor:pointer;font-size:0.82rem;font-weight:600;">
            📌 Fixar comunicado (fica sempre visível no topo)
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeComunicadoModal()">Cancelar</button>
        <button class="btn-save" onclick="salvarComunicado()">📢 Publicar</button>
      </div>
    </div>
  </div>

  <!-- ══ SCRIPTS ══ -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/sync.js"></script>
  <script src="assets/js/menu.js"></script>
  <script src="assets/js/comunicados.js"></script>
  <script src="assets/js/init.js"></script>

</body>
</html>
