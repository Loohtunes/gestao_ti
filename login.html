<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão T.I — Login</title>
    <link rel="icon" href="img/premovale (1).png">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        /* Anti-flash: aplica tema ANTES do primeiro pixel ser renderizado */
        (function () {
            try {
                const saved = localStorage.getItem('premovale-theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (saved === 'dark' || (!saved && prefersDark)) {
                    document.documentElement.classList.add('dark-mode');
                }
            } catch (e) { }
        })();
    </script>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body>

    <div class="login-screen" id="login-screen" style="display:flex;">
        <div class="login-box">
            <div class="login-icon">
                <img src="img/premovale (1).png" width="100px" height="100px">
            </div>
            <h2 class="login-title">Sistema de Chamados</h2>
            <p class="login-subtitle">Faça login para acessar os chamados</p>

            <div id="login-msg" style="display:none;margin-top:0.75rem;padding:0.6rem 1rem;
        border-radius:8px;font-size:0.78rem;font-family:'Space Mono',monospace;
        font-weight:600;text-align:center;animation:slideUpDetail 0.3s ease;">
            </div>

            <div class="login-form">
                <div class="login-input-group">
                    <label class="login-label" style="display:flex;align-items:center;gap:5px;"><svg width="14"
                            height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;vertical-align:middle">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg> Nome de Usuário</label>
                    <input type="text" class="login-input" id="attendant-name" placeholder="Digite seu nome"
                        onkeydown="if(event.key==='Enter')document.getElementById('attendant-pass').focus()">
                </div>
                <div class="login-input-group">
                    <label class="login-label" style="display:flex;align-items:center;gap:5px;"><svg width="14"
                            height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;vertical-align:middle">
                            <path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z" />
                            <circle cx="16.5" cy="7.5" r=".5" fill="currentColor" />
                        </svg> Senha</label>
                    <input type="password" class="login-input" id="attendant-pass" placeholder="Digite sua senha"
                        onkeydown="if(event.key==='Enter')performLogin()">
                </div>
                <button class="login-btn" onclick="performLogin()">Entrar</button>
                <div class="login-actions">
                    <button class="login-btn secondary" id="first-user-btn" style="display:none;"
                        onclick="openUserForm(true)">Criar Administrador Geral</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ Firebase SDK ═══ -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/state.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/init.js"></script>

    <script>
        function showLoginMessage(msg, type) {
            const el = document.getElementById('login-msg');
            if (!el) return;
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = type === 'warn' ? '#fef3c7' : '#f0fdf4';
            el.style.color = type === 'warn' ? '#92400e' : '#166534';
            el.style.border = type === 'warn' ? '1px solid #fde68a' : '1px solid #bbf7d0';
            if (document.body.classList.contains('dark-mode')) {
                el.style.background = type === 'warn' ? '#2a1f00' : '#0d2818';
                el.style.color = type === 'warn' ? '#fde68a' : '#86efac';
                el.style.border = type === 'warn' ? '1px solid #854d0e' : '1px solid #166534';
            }
        }

        // Verificar se já está logado ao carregar
        document.addEventListener('DOMContentLoaded', async () => {
            await loadUsers();
            const hasSuperAdmin = users.some(u => u.isSuperAdmin);
            document.getElementById('first-user-btn').style.display =
                !hasSuperAdmin ? 'inline-block' : 'none';

            // Se já está logado, redirecionar para menu
            const savedId = localStorage.getItem('chamados-current-user-id');
            if (savedId && users.find(u => u.id === savedId)) {
                window.location.href = 'menu.html';
            }

            // Mostrar mensagem de inatividade se vier redirecionado
            const urlReason = new URLSearchParams(window.location.search).get('reason');
            if (urlReason === 'inatividade') {
                showLoginMessage('⏰ Sua sessão foi encerrada por inatividade.', 'warn');
                window.history.replaceState({}, '', window.location.pathname);
            }
        });
    </script>

</body>

</html>
